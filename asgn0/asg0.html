<!DOCTYPE html>
<html lang="en">

 <head>
    <script src="lib/cuon-matrix-cse160.js"></script>
    <meta charset="utf-8" />
    <title>Draw a blue rectangle (canvas version)</title>
 </head>
 
 <body onload="main()">
    <canvas id="example" width="400" height="400">
        Please use a browser that supports "canvas"
    </canvas>
    <script src="asg0.js"></script>
    
    <div id="firstInput">
        v1:
        <label for="xCoord1">x</label>
        <input type="number" id="xCoord1" name="xCoord1"></input>
        
        <label for="yCoord1">y</label>
        <input type="number" id="yCoord1" name="yCoord1"></input>
    </div>
    <div id="secondInput">
        v2:
        <label for="xCoord2">x</label>
        <input type="number" id="xCoord2" name="xCoord2"></input>
        
        <label for="yCoord2">y</label>
        <input type="number" id="yCoord2" name="yCoord2"></input>
    </div>
    <div style="margin-bottom: 10px" id="draw">
        <button type="button"
            id="drawButton" 
            name="drawButton" 
            onclick="handleDrawEvent()">Draw</button>
    </div>
    <div id="operationSection">
        Operation:
        <select id="operationSelect">
            <option value="mul">Multiply</option>
            <option value="div">Divide</option>
            <option value="add">Add</option>
            <option value="sub">Subtract</option>
        </select>
        <label for="scalarVal">Scalar:</label>
        <input type="number" id="scalarVal"></input>
    </div>
    <div style="margin-bottom: 10px" id="operationDraw">
        <button type="button"
            id="operationDrawButton" 
            name="operationDrawButton" 
            onclick="handleDrawOperationEvent()">Draw</button>
    </div>
 </body>
</html>
