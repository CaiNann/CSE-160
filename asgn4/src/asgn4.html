<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Paint!</title>
</head>
 
<body>
    <div id="canvas-container" style="position: relative; display: inline-block;">
        <canvas id="webgl" width="400" height="400" style="border: 1px solid black;"></canvas>
    </div>

    <div id="fps" style="
    position: fixed;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.6);
    color: #000000;
    font-family: monospace;
    font-size: 16px;
    padding: 4px 10px;
    border-radius: 4px;
    ">FPS: --</div>
    
    <div id="hud" style="
    position: absolute;
    top: 20px;
    left: 20px;
    color: white;
    font-size: 24px;
    font-family: monospace;
    text-shadow: 2px 2px 0px black;
    pointer-events: none;
">
    Eucalyptus: 0 / 5 (F to pick up)
    </div>

    <button id="normalOn">Normal On</button>
    <button id="normalOff">Normal Off</button>

    <button id="animToggle" onclick="toggleAnimation()">Stop/Start Animation</button>
    <div>
        Light X<input type="range" min="-250" max="250" value="0" class="slider" id="lightX">
        Light Y<input type="range" min="-250" max="250" value="0" class="slider" id="lightY">
        Light Z<input type="range" min="-250" max="250" value="0" class="slider" id="lightZ">
    </div>
    
 
    <script src="../lib/webgl-utils.js"></script>
    <script src="../lib/webgl-debug.js"></script>
    <script src="../lib/cuon-utils.js"></script>
    <script src="../lib/cuon-matrix-cse160.js"></script>
    <script src="Point.js"></script>
    <script type="module" src="asgn4.js"></script>
    
    
    
   
</body>
</html>
