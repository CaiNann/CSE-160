<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Paint!</title>
</head>
 
<body>
    <div id="canvas-container" style="position: relative; display: inline-block;">
        <canvas id="webgl" width="400" height="400" style="border: 1px solid black;"></canvas>
        
        <div id="bottomText" hidden style="
            position: absolute; 
            bottom: 10px;           
            width: 100%;            
            text-align: center;     
            color: white;           
            font-family: Arial; 
            font-weight: bold;
            pointer-events: none;   
        ">
            Wait for the green background...
        </div>
    </div>
    
    <div>
        <button type="button" id="green">Green</button>
        <button type="button" id="red">Red</button>
        <button type="button" id="clear">Clear</button>
    </div>
    
    <div>
        <button type="button" id="point">Point</button>
        <button type="button" id="triangle">Triangle</button>
        <button type="button" id="circle">Circle</button>
    </div>
    
    <div>
        <button type="button" id="custom">Draw Custom Image</button>
    </div>
    
    <div>
        Red <input type="range" min="0" max="100" value="100" class="slider" id="redSlider">
    </div>
    <div>
        Green <input type="range" min="0" max="100" value="100" class="slider" id="greenSlider">
    </div>
    <div>
        Blue <input type="range" min="0" max="100" value="100" class="slider" id="blueSlider">
    </div>
    <div>
        Camera Angle <input type="range" min="0" max="90" value="5" class="slider" id="angleSlider"
    </div>
    <div>
        (Circles) Segment Count <input type="range" min="10" max="20" value="10" class="slider" id="segmentSlider"
    </div>
    
    <div>
        <button type="button" id="gameButton" hidden>High Noon...</button>
    </div>
    <div>
        <id=hidden></idhidden>
    </div>
    
 
    <script src="../lib/webgl-utils.js"></script>
    <script src="../lib/webgl-debug.js"></script>
    <script src="../lib/cuon-utils.js"></script>
    <script src="../lib/cuon-matrix-cse160.js"></script>
    <script src="Point.js"></script>
    <script type="module" src="asgn2.js"></script>
    
    
    
   
</body>
</html>
