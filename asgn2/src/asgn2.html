<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Paint!</title>
</head>
 
<body>
    <div id="canvas-container" style="position: relative; display: inline-block;">
        <canvas id="webgl" width="400" height="400" style="border: 1px solid black;"></canvas>
    </div>

    <div id="fps" style="
    position: fixed;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.6);
    color: #00ff88;
    font-family: monospace;
    font-size: 16px;
    padding: 4px 10px;
    border-radius: 4px;
    ">FPS: --</div>
    
    <div>
        Camera Angle X<input type="range" min="-360" max="360" value="0" class="slider" id="XangleSlider"
    </div>
    <div>
        Camera Angle Y<input type="range" min="-360" max="360" value="0" class="slider" id="YangleSlider"
    </div>
    <div>
        Camera Angle Z<input type="range" min="-360" max="360" value="0" class="slider" id="ZangleSlider"
    </div>

    <div>
        Left Arm <input type="range" min="-20" max="40" value="0" class="slider" id="leftArmAngle">
        Left Hand <input type="range" min="-20" max="20" value="0" class="slider" id="leftHandAngle">
        Left Shoulder <input type="range" min="-30" max="30" value="0" class="slider" id="leftShoulderAngle">
    </div>
    <div>
        Right Arm <input type="range" min="-20" max="40" value="0" class="slider" id="rightArmAngle">
        Right Hand <input type="range" min="-20" max="20" value="0" class="slider" id="rightHandAngle">
        Right Shoulder <input type="range" min="-30" max="20" value="0" class="slider" id="rightShoulderAngle">
    </div>
    <button id="animToggle" onclick="toggleAnimation()">Stop/Start Animation</button>
    
 
    <script src="../lib/webgl-utils.js"></script>
    <script src="../lib/webgl-debug.js"></script>
    <script src="../lib/cuon-utils.js"></script>
    <script src="../lib/cuon-matrix-cse160.js"></script>
    <script src="Point.js"></script>
    <script type="module" src="asgn2.js"></script>
    
    
    
   
</body>
</html>
